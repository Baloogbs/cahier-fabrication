<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1D9E75" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Nouvelle fabrication — Cahier de fabrication</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="page-saisie">

  <div class="app-wrapper">
    <header class="app-header">
      <button class="btn-back" onclick="window.location.href='accueil.html'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Retour
      </button>
      <h1 class="app-title" style="font-size:17px;">Nouvelle fabrication</h1>
      <div style="width:70px;"></div>
    </header>

    <main class="main-content">

      <div class="card">
        <div class="card-title">Informations générales</div>
        <div class="type-badge" id="type-badge">Préparation bouchère</div>

        <div class="field-row">
          <label class="field-label">Nom de la préparation</label>
          <input type="text" id="fab-nom" placeholder="Ex : Brochettes provençales" />
        </div>

        <div class="two-col">
          <div class="field-row">
            <label class="field-label">Poids final (kg)</label>
            <input type="number" id="fab-poids" placeholder="0.00" step="0.1" min="0" />
          </div>
          <div class="field-row">
            <label class="field-label">Date</label>
            <input type="date" id="fab-date" />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Ingrédients</div>
        <div id="ingredients-list"></div>

        <div class="scan-feedback hidden" id="scan-feedback"></div>

        <!-- Nouveau système d'ajout d'ingrédients -->
        <div id="ingredient-actions">
          <button class="btn-primary" onclick="toggleIngChoices()" style="margin-bottom: 10px; background: var(--blue-mid); color: white;">
            + Ajouter un ingrédient
          </button>
          
          <div id="ing-choices" class="choices-panel hidden" style="margin-bottom: 15px; border: 1px solid var(--blue-mid);">
            <button class="choice-item" onclick="startScanMode()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:10px;"><rect x="3" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/><rect x="3" y="16" width="5" height="5" rx="1"/><line x1="16" y1="16" x2="21" y2="21"/></svg>
              Scanner un code-barres
            </button>
            <button class="choice-item" onclick="takePhoto()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:10px;"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              Prendre une photo
            </button>
          </div>

          <div id="scan-zone" class="hidden" style="margin-bottom: 15px;">
            <!-- Zone pour la caméra -->
            <div id="interactive" class="viewport" style="width: 100%; height: 200px; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 10px; position: relative;">
               <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid var(--green); width: 80%; height: 60%; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); pointer-events: none;"></div>
            </div>
            <div class="scan-input-row">
              <input type="text" id="scan-input" placeholder="Scanner le code-barres..." 
                onkeydown="handleScanInput(event)" autocomplete="off" />
              <button class="btn-scan" onclick="stopScanMode()" style="background: #999;">Annuler</button>
            </div>
          </div>
        </div>

        <div id="photo-preview" class="photo-preview hidden"></div>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
        <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none;" onchange="handlePhoto(event)" />
      </div>

      <button class="btn-primary" onclick="saveFabrication()">Enregistrer la fabrication</button>
      <div id="save-error" class="error-msg hidden"></div>

    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
