<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1D9E75" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Nouvelle fabrication — Cahier de fabrication</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="page-saisie">

  <div class="app-wrapper">
    <header class="app-header">
      <button class="btn-back" onclick="window.location.href='accueil.html'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Retour
      </button>
      <h1 class="app-title" style="font-size:17px;">Nouvelle fabrication</h1>
      <div style="width:70px;"></div>
    </header>

    <main class="main-content">

      <div class="card">
        <div class="card-title">Informations générales</div>
        <div class="type-badge" id="type-badge">Préparation bouchère</div>

        <div class="field-row">
          <label class="field-label">Nom de la préparation</label>
          <input type="text" id="fab-nom" placeholder="Ex : Brochettes provençales" />
        </div>

        <div class="two-col">
          <div class="field-row">
            <label class="field-label">Poids final (kg)</label>
            <input type="number" id="fab-poids" placeholder="0.00" step="0.1" min="0" />
          </div>
          <div class="field-row">
            <label class="field-label">Date</label>
            <input type="date" id="fab-date" />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Ingrédients</div>
        <div id="ingredients-list"></div>

        <div class="scan-feedback hidden" id="scan-feedback"></div>

        <!-- Système simplifié : Photo uniquement -->
        <div id="ingredient-actions" style="margin-top: 20px;">
          <button class="btn-primary" onclick="takePhoto()" 
            style="background: #1D9E75; color: white; display: flex; align-items: center; justify-content: center; width: 100%; padding: 15px; font-weight: 500;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:12px;">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>
            </svg>
            Prendre une photo de l'ingrédient
          </button>
        </div>

        <div id="photo-preview" class="photo-preview hidden"></div>
        <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none;" onchange="handlePhoto(event)" />
      </div>

      <button class="btn-primary" onclick="saveFabrication()">Enregistrer la fabrication</button>
      <div id="save-error" class="error-msg hidden"></div>

    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
