<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1D9E75" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Accueil — Cahier de fabrication</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="page-home">

  <div class="app-wrapper">
    <header class="app-header">
      <div>
        <h1 class="app-title">Cahier de fabrication</h1>
        <p class="app-subtitle" id="header-user">Boucherie &mdash; Carrefour</p>
      </div>
      <button class="btn-logout" onclick="handleLogout()" title="Déconnexion">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </header>

    <main class="main-content">
      <button class="btn-add-main" id="btn-add" onclick="goToNew('preparation')">
        <span class="btn-add-plus">+</span>
        <span>Nouvelle fabrication bouchère</span>
      </button>

      <div class="section-header">
        <span class="section-title">Historique</span>
      </div>

      <div id="history-list">
        <div class="empty-state">Aucune fabrication enregistrée pour le moment.</div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
